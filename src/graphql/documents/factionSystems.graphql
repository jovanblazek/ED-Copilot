query FactionSystems($factionId: UUID!, $first: Int!, $after: Cursor) {
  factionStates(
    orderBy: UPDATED_AT_DESC
    condition: { factionId: $factionId }
    first: $first
    after: $after
  ) {
    edges {
      cursor
      node {
        influence
        system {
          name
        }
        pendingStates
        activeStates
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
